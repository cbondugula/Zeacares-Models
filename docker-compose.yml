version: "3.9"

services:
  # ── Main API Service ──────────────────────────────────────────────────────────
  zeacares-api:
    build: .
    container_name: zeacares-api
    ports:
      - "8000:8000"
    environment:
      # FIX: code reads OPENAI_API_KEY (see src/pipeline/classifier.py); the
      # original compose passed OPENROUTER_API_KEY which the code ignored,
      # so the LLM fallback always silently returned R69 "Illness, unspecified".
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # FIX: code uses pymongo against MONGO_URI; original compose had
      # PostgreSQL/Redis but no Mongo, so MongoClient timed out at boot.
      - MONGO_URI=mongodb://zeacares-mongo:27017
      - MODEL_CACHE_DIR=/app/model_cache
      - LOG_LEVEL=INFO
    volumes:
      - ./results:/app/results
      - model_cache:/app/model_cache
    depends_on:
      zeacares-mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zeacares-net
    deploy:
      resources:
        limits:
          memory: 4G

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  # Required by src/api/main.py (pymongo). Was missing from the original compose.
  zeacares-mongo:
    image: mongo:7
    container_name: zeacares-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zeacares-net

  # ── Background Worker (trend detection) ───────────────────────────────────────
  zeacares-worker:
    build: .
    container_name: zeacares-worker
    command: >
      python -c "
      import time, logging
      from src.pipeline.trend_detector import TrendDetector
      from pathlib import Path
      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger('worker')
      detector = TrendDetector()
      while True:
          classified = Path('results/classified.json')
          if classified.exists():
              logger.info('Running trend detection...')
              detector.run(str(classified), 'results/alerts.json')
          time.sleep(3600)
      "
    environment:
      - MONGO_URI=mongodb://zeacares-mongo:27017
    volumes:
      - ./results:/app/results
      - model_cache:/app/model_cache
    depends_on:
      - zeacares-api
    restart: unless-stopped
    networks:
      - zeacares-net

volumes:
  mongo_data:
  model_cache:

networks:
  zeacares-net:
    driver: bridge
